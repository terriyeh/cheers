name: Claude Code Review

on:
  pull_request:
    types: [opened, reopened, synchronize]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  claude-review:
    runs-on: ubuntu-latest
    # Only run on PR events OR when @claude is mentioned in comments
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       contains(github.event.comment.body, '@claude'))
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'issue_comment' && format('refs/pull/{0}/head', github.event.issue.number) || github.ref }}

      - name: React to comment
        if: github.event_name == 'issue_comment'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'eyes'
            });

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Get PR changes
        id: changes
        env:
          BASE_REF: ${{ github.event_name == 'issue_comment' && github.event.repository.default_branch || github.base_ref }}
        run: |
          # Get list of changed files
          git diff --name-only origin/$BASE_REF...HEAD > changed_files.txt

          # Get full diff
          git diff origin/$BASE_REF...HEAD > changes.diff

          # Count changed files
          FILE_COUNT=$(wc -l < changed_files.txt)
          echo "file_count=$FILE_COUNT" >> $GITHUB_OUTPUT

          echo "Changed files:"
          cat changed_files.txt

      - name: Run Claude Code Review
        id: review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          PR_NUMBER: ${{ github.event_name == 'issue_comment' && github.event.issue.number || github.event.pull_request.number }}
          PR_TITLE: ${{ github.event_name == 'issue_comment' && github.event.issue.title || github.event.pull_request.title }}
          REPO_NAME: ${{ github.repository }}
        run: |
          node .github/scripts/claude-review.js

      - name: Post review comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const reviewResult = fs.readFileSync('review-result.md', 'utf8');

            // Find existing Claude review comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const claudeComment = comments.find(comment =>
              comment.user.type === 'Bot' &&
              comment.body.includes('🤖 Claude Code Review')
            );

            const commentBody = `## 🤖 Claude Code Review\n\n${reviewResult}\n\n---\n*Automated review by [Claude Code](https://claude.com/claude-code)*`;

            if (claudeComment) {
              // Update existing comment
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: claudeComment.id,
                body: commentBody
              });
            } else {
              // Create new comment
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: commentBody
              });
            }

      - name: Check for critical issues
        run: |
          if grep -q "CRITICAL" review-result.md; then
            echo "::error::Critical issues found in code review"
            exit 1
          fi
